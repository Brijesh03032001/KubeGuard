---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeguard-exporter
  namespace: default
  labels:
    app: kubeguard-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeguard-exporter
  template:
    metadata:
      labels:
        app: kubeguard-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: kubeguard-exporter
          image: kubeguard-exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: kubeguard-exporter
  namespace: default
  labels:
    app: kubeguard-exporter
spec:
  selector:
    app: kubeguard-exporter
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
  type: ClusterIP
